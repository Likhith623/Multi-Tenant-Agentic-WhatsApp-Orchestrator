[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

; ── nginx (reverse proxy on $PORT) ───────────────────────────────────────────
; Wait for the backend to be healthy before starting Nginx. 
; This ensures Cloud Run's TCP probe on 8080 doesn't pass until the backend is actually ready.
[program:nginx]
command=/bin/bash -c "while ! curl -s http://127.0.0.1:8000/health > /dev/null; do sleep 1; done; exec nginx -g 'daemon off;'"
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ── FastAPI backend (uvicorn on :8000) ───────────────────────────────────────
[program:backend]
command=/venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1
directory=/app/backend
autostart=true
autorestart=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ── Next.js frontend (standalone server on :3000) ────────────────────────────
[program:frontend]
command=node server.js
directory=/app/frontend
environment=PORT=3000,HOSTNAME=0.0.0.0,NODE_ENV=production
autostart=true
autorestart=true
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
